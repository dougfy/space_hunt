<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" style="background:#0a0a0a">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#4fffb0" font-size="14" font-weight="bold">SHIP STATUS ICONS</text>

  <!-- DOCKED -->
  <g transform="translate(75, 100)">
    <!-- Anchor icon -->
    <circle cx="0" cy="-20" r="6" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <circle cx="0" cy="-20" r="2" fill="#4fffb0"/>
    <line x1="0" y1="-14" x2="0" y2="10" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#4fffb0" stroke-width="1.5"/>
    <path d="M-10 10 Q-10 0 0 0 Q10 0 10 10" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <!-- Waves -->
    <path d="M-12 16 Q-8 12 -4 16 Q0 20 4 16 Q8 12 12 16" fill="none" stroke="#2a9968" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="10">DOCKED</text>
    <text x="0" y="54" text-anchor="middle" fill="#2a9968" font-size="8">Parked at station</text>
  </g>

  <!-- IDLE -->
  <g transform="translate(225, 100)">
    <!-- Pause icon -->
    <rect x="-12" y="-24" width="8" height="28" rx="2" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <rect x="4" y="-24" width="8" height="28" rx="2" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <rect x="-10" y="-22" width="4" height="24" fill="#2a9968"/>
    <rect x="6" y="-22" width="4" height="24" fill="#2a9968"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="10">IDLE</text>
    <text x="0" y="54" text-anchor="middle" fill="#2a9968" font-size="8">At star, undocked</text>
  </g>

  <!-- IN-TRANSIT -->
  <g transform="translate(375, 100)">
    <!-- Arrow -->
    <line x1="-20" y1="0" x2="12" y2="0" stroke="#ffb84d" stroke-width="2"/>
    <polygon points="12,-6 24,0 12,6" fill="#ffb84d"/>
    <!-- Motion lines -->
    <line x1="-24" y1="-8" x2="-14" y2="-8" stroke="#ffb84d" stroke-width="1" opacity="0.5"/>
    <line x1="-28" y1="0" x2="-22" y2="0" stroke="#ffb84d" stroke-width="1" opacity="0.3"/>
    <line x1="-24" y1="8" x2="-14" y2="8" stroke="#ffb84d" stroke-width="1" opacity="0.5"/>
    <text x="0" y="40" text-anchor="middle" fill="#ffb84d" font-size="10">IN-TRANSIT</text>
    <text x="0" y="54" text-anchor="middle" fill="#2a9968" font-size="8">Moving to dest</text>
  </g>

  <!-- BUILDING -->
  <g transform="translate(525, 100)">
    <!-- Gear icon -->
    <circle cx="0" cy="-6" r="10" fill="none" stroke="#1a5c3f" stroke-width="1.5"/>
    <circle cx="0" cy="-6" r="4" fill="none" stroke="#1a5c3f" stroke-width="1.5"/>
    <!-- Gear teeth -->
    <rect x="-2" y="-20" width="4" height="6" fill="#1a5c3f"/>
    <rect x="-2" y="2" width="4" height="6" fill="#1a5c3f"/>
    <rect x="-14" y="-8" width="6" height="4" fill="#1a5c3f"/>
    <rect x="8" y="-8" width="6" height="4" fill="#1a5c3f"/>
    <!-- Progress bar below -->
    <rect x="-20" y="14" width="40" height="4" fill="#0d3020" rx="2"/>
    <rect x="-20" y="14" width="24" height="4" fill="#2a9968" rx="2"/>
    <text x="0" y="40" text-anchor="middle" fill="#2a9968" font-size="10">BUILDING</text>
    <text x="0" y="54" text-anchor="middle" fill="#1a5c3f" font-size="8">Under construction</text>
  </g>

  <!-- Border -->
  <rect x="2" y="2" width="596" height="196" fill="none" stroke="#0d3020" stroke-width="1" rx="4"/>
</svg>
