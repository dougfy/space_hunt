<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" style="background:#050a08">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
  </defs>

  <text x="260" y="24" text-anchor="middle" fill="#4fffb0" font-size="12" font-weight="bold">GALAXY MAP — FLEET BADGES &amp; TRANSIT LINES</text>

  <!-- Galaxy background field (faint stars) -->
  <circle cx="45" cy="80" r="1" fill="#0d3020"/>
  <circle cx="100" cy="60" r="1" fill="#0d3020"/>
  <circle cx="160" cy="100" r="1" fill="#0d3020"/>
  <circle cx="80" cy="140" r="1" fill="#0d3020"/>
  <circle cx="440" cy="90" r="1" fill="#0d3020"/>
  <circle cx="380" cy="70" r="1" fill="#0d3020"/>
  <circle cx="480" cy="140" r="1" fill="#0d3020"/>
  <circle cx="60" cy="200" r="1" fill="#0d3020"/>
  <circle cx="470" cy="250" r="1" fill="#0d3020"/>
  <circle cx="140" cy="300" r="1" fill="#0d3020"/>
  <circle cx="420" cy="320" r="1" fill="#0d3020"/>
  <circle cx="300" cy="80" r="1" fill="#0d3020"/>
  <circle cx="350" cy="350" r="1" fill="#0d3020"/>
  <circle cx="200" cy="340" r="1" fill="#0d3020"/>

  <!-- Non-owned stars (dim) -->
  <circle cx="90" cy="120" r="3" fill="#0d3020" stroke="#1a5c3f" stroke-width="0.5"/>
  <circle cx="450" cy="110" r="3" fill="#0d3020" stroke="#1a5c3f" stroke-width="0.5"/>
  <circle cx="320" cy="320" r="3" fill="#0d3020" stroke="#1a5c3f" stroke-width="0.5"/>
  <circle cx="150" cy="260" r="3" fill="#0d3020" stroke="#1a5c3f" stroke-width="0.5"/>
  <circle cx="400" cy="280" r="3" fill="#0d3020" stroke="#1a5c3f" stroke-width="0.5"/>

  <!-- ═══ QUOEN I — Player star with ships ═══ -->
  <circle cx="180" cy="170" r="6" fill="#4fffb0" opacity="0.8"/>
  <circle cx="180" cy="170" r="10" fill="none" stroke="#4fffb0" stroke-width="0.5" opacity="0.3"/>
  <text x="180" y="155" text-anchor="middle" fill="#4fffb0" font-size="8">QUOEN I</text>

  <!-- Fleet badge -->
  <rect x="192" y="162" width="28" height="14" rx="3" fill="rgba(0,10,5,0.9)" stroke="#4fffb0" stroke-width="1"/>
  <!-- Hexagon ship icon -->
  <polygon points="200,169 203,166 207,166 210,169 207,172 203,172" fill="#4fffb0" stroke="none"/>
  <text x="216" y="173" fill="#4fffb0" font-size="8" font-weight="bold">4</text>

  <!-- ═══ VEGA III — Player star with ships ═══ -->
  <circle cx="360" cy="200" r="5" fill="#4fffb0" opacity="0.6"/>
  <circle cx="360" cy="200" r="9" fill="none" stroke="#4fffb0" stroke-width="0.5" opacity="0.2"/>
  <text x="360" y="186" text-anchor="middle" fill="#4fffb0" font-size="8">VEGA III</text>

  <!-- Fleet badge -->
  <rect x="372" y="192" width="28" height="14" rx="3" fill="rgba(0,10,5,0.9)" stroke="#4fffb0" stroke-width="1"/>
  <polygon points="380,199 383,196 387,196 390,199 387,202 383,202" fill="#4fffb0" stroke="none"/>
  <text x="396" y="203" fill="#4fffb0" font-size="8" font-weight="bold">2</text>

  <!-- ═══ DENEB V — Player star, no ships ═══ -->
  <circle cx="280" cy="260" r="4" fill="#2a9968" opacity="0.5"/>
  <text x="280" y="248" text-anchor="middle" fill="#2a9968" font-size="8">DENEB V</text>
  <!-- No badge — zero ships -->

  <!-- ═══ IN-TRANSIT: QUOEN I → VEGA III ═══ -->
  <!-- Dotted transit line -->
  <line x1="190" y1="172" x2="350" y2="198" stroke="#ffb84d" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Ship marker on route (at ~40% progress) -->
  <circle cx="255" cy="183" r="3" fill="#ffb84d"/>
  <circle cx="255" cy="183" r="6" fill="none" stroke="#ffb84d" stroke-width="0.5" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="255" y="176" text-anchor="middle" fill="#ffb84d" font-size="6">DESTROYER</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="30" y="330" width="460" height="40" rx="3" fill="rgba(0,10,5,0.8)" stroke="#0d3020" stroke-width="1"/>
  <text x="50" y="348" fill="#2a9968" font-size="8">LEGEND:</text>

  <!-- Badge example -->
  <rect x="110" y="340" width="24" height="12" rx="2" fill="none" stroke="#4fffb0" stroke-width="0.8"/>
  <polygon points="116,346 118,344 121,344 123,346 121,348 118,348" fill="#4fffb0" stroke="none" transform="scale(0.8) translate(26,86)"/>
  <text x="128" y="350" fill="#4fffb0" font-size="7">3</text>
  <text x="145" y="350" fill="#2a9968" font-size="7">= Ships at star</text>

  <!-- Transit line example -->
  <line x1="260" y1="346" x2="300" y2="346" stroke="#ffb84d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="350" fill="#ffb84d" font-size="7">= Ship in transit</text>

  <!-- Pulsing dot -->
  <circle cx="420" cy="346" r="3" fill="#ffb84d"/>
  <text x="430" y="350" fill="#ffb84d" font-size="7">= Moving ship</text>
</svg>
