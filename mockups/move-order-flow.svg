<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 700" style="background:#050a08">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
    <!-- Pulsing animation for destination rings -->
    <animate id="pulse" attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </defs>

  <!-- ═══ STEP 1: SELECT SHIP ═══ -->
  <text x="260" y="24" text-anchor="middle" fill="#4fffb0" font-size="11" font-weight="bold">STEP 1: SELECT SHIP → TAP MOVE</text>

  <!-- Mini panel -->
  <rect x="30" y="36" width="460" height="100" rx="4" fill="rgba(0,10,5,0.95)" stroke="#4fffb0" stroke-width="1"/>

  <text x="260" y="56" text-anchor="middle" fill="#4fffb0" font-size="10" font-weight="bold">FLEET COMMAND</text>

  <text x="44" y="76" fill="#4fffb0" font-size="9" font-weight="bold">★ QUOEN I</text>

  <!-- Selected row -->
  <rect x="40" y="82" width="440" height="20" rx="2" fill="rgba(20,80,60,0.4)" stroke="#4fffb0" stroke-width="1"/>
  <text x="52" y="96" fill="#4fffb0" font-size="9">▶ Scout         x1    ⚓ DOCKED</text>
  <rect x="360" y="84" width="44" height="16" rx="2" fill="rgba(79,255,176,0.2)" stroke="#4fffb0" stroke-width="1.5"/>
  <text x="382" y="96" text-anchor="middle" fill="#4fffb0" font-size="8" font-weight="bold">MOVE</text>
  <rect x="410" y="84" width="36" height="16" rx="2" fill="none" stroke="#2a9968" stroke-width="1"/>
  <text x="428" y="96" text-anchor="middle" fill="#2a9968" font-size="8">INFO</text>

  <text x="260" y="128" text-anchor="middle" fill="#2a9968" font-size="9">↓ Player taps MOVE button</text>

  <!-- ═══ STEP 2: SELECT DESTINATION ═══ -->
  <text x="260" y="166" text-anchor="middle" fill="#4fffb0" font-size="11" font-weight="bold">STEP 2: SELECT DESTINATION ON MAP</text>

  <!-- Galaxy map area -->
  <rect x="30" y="178" width="460" height="200" rx="4" fill="rgba(0,5,3,0.9)" stroke="#2a9968" stroke-width="1"/>

  <!-- Stars (dots) -->
  <circle cx="120" cy="240" r="2" fill="#1a5c3f"/>
  <circle cx="180" cy="210" r="2" fill="#1a5c3f"/>
  <circle cx="90" cy="290" r="2" fill="#1a5c3f"/>
  <circle cx="200" cy="320" r="2" fill="#1a5c3f"/>
  <circle cx="350" cy="350" r="2" fill="#1a5c3f"/>
  <circle cx="420" cy="220" r="2" fill="#1a5c3f"/>
  <circle cx="380" cy="260" r="2" fill="#1a5c3f"/>
  <circle cx="440" cy="310" r="2" fill="#1a5c3f"/>

  <!-- Current star: QUOEN I (you are here) -->
  <circle cx="200" cy="270" r="5" fill="#4fffb0"/>
  <circle cx="200" cy="270" r="9" fill="none" stroke="#4fffb0" stroke-width="1"/>
  <text x="200" y="256" text-anchor="middle" fill="#4fffb0" font-size="8" font-weight="bold">QUOEN I</text>
  <text x="200" y="290" text-anchor="middle" fill="#2a9968" font-size="7">[YOU ARE HERE]</text>

  <!-- Valid destination 1: VEGA III (pulsing) -->
  <circle cx="340" cy="280" r="4" fill="#ffb84d" opacity="0.8"/>
  <circle cx="340" cy="280" r="10" fill="none" stroke="#ffb84d" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="10;14;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="340" y="266" text-anchor="middle" fill="#ffb84d" font-size="8" font-weight="bold">VEGA III</text>
  <text x="340" y="298" text-anchor="middle" fill="#ffb84d" font-size="7">ETA: 5m12s</text>

  <!-- Valid destination 2: DENEB V (pulsing) -->
  <circle cx="430" cy="340" r="4" fill="#ffb84d" opacity="0.8"/>
  <circle cx="430" cy="340" r="10" fill="none" stroke="#ffb84d" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="10;14;10" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <text x="430" y="326" text-anchor="middle" fill="#ffb84d" font-size="8">DENEB V</text>
  <text x="430" y="358" text-anchor="middle" fill="#ffb84d" font-size="7">ETA: 8m40s</text>

  <!-- Dashed line showing potential route -->
  <line x1="209" y1="270" x2="330" y2="280" stroke="#ffb84d" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Instruction overlay -->
  <rect x="140" y="350" width="240" height="20" rx="3" fill="rgba(0,10,5,0.9)" stroke="#ffb84d" stroke-width="1"/>
  <text x="260" y="364" text-anchor="middle" fill="#ffb84d" font-size="9">TAP A HIGHLIGHTED STAR</text>

  <text x="260" y="396" text-anchor="middle" fill="#2a9968" font-size="9">↓ Player taps VEGA III</text>

  <!-- ═══ STEP 3: CONFIRM ORDER ═══ -->
  <text x="260" y="430" text-anchor="middle" fill="#4fffb0" font-size="11" font-weight="bold">STEP 3: CONFIRM MOVE ORDER</text>

  <!-- Confirm dialog -->
  <rect x="120" y="444" width="280" height="170" rx="6" fill="rgba(0,10,5,0.98)" stroke="#4fffb0" stroke-width="2"/>

  <!-- Header -->
  <text x="260" y="470" text-anchor="middle" fill="#4fffb0" font-size="11" font-weight="bold">MOVE SCOUT TO VEGA III?</text>

  <!-- Route visualization -->
  <circle cx="170" cy="500" r="4" fill="#4fffb0"/>
  <text x="170" y="520" text-anchor="middle" fill="#2a9968" font-size="7">QUOEN I</text>
  <line x1="180" y1="500" x2="340" y2="500" stroke="#ffb84d" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Ship icon on route -->
  <polygon points="260,494 254,502 260,500 266,502" fill="#ffb84d"/>
  <circle cx="350" cy="500" r="4" fill="#ffb84d"/>
  <text x="350" y="520" text-anchor="middle" fill="#ffb84d" font-size="7">VEGA III</text>

  <!-- Stats -->
  <text x="180" y="546" fill="#2a9968" font-size="9">Distance:</text>
  <text x="310" y="546" fill="#4fffb0" font-size="9">4.2 ly</text>
  <text x="180" y="562" fill="#2a9968" font-size="9">Speed:</text>
  <text x="310" y="562" fill="#4fffb0" font-size="9">7</text>
  <text x="180" y="578" fill="#2a9968" font-size="9">ETA:</text>
  <text x="310" y="578" fill="#ffb84d" font-size="9" font-weight="bold">5m 12s</text>

  <!-- Buttons -->
  <rect x="160" y="590" width="100" height="24" rx="3" fill="rgba(20,80,60,0.6)" stroke="#4fffb0" stroke-width="1.5"/>
  <text x="210" y="606" text-anchor="middle" fill="#4fffb0" font-size="10" font-weight="bold">CONFIRM</text>
  <rect x="280" y="590" width="80" height="24" rx="3" fill="none" stroke="#1a5c3f" stroke-width="1"/>
  <text x="320" y="606" text-anchor="middle" fill="#1a5c3f" font-size="10">CANCEL</text>

  <!-- ═══ RESULT ═══ -->
  <text x="260" y="650" text-anchor="middle" fill="#2a9968" font-size="9">↓ Ship enters IN-TRANSIT state</text>

  <rect x="80" y="660" width="360" height="24" rx="3" fill="rgba(48,32,0,0.2)" stroke="rgba(255,184,77,0.5)" stroke-width="1"/>
  <text x="260" y="676" text-anchor="middle" fill="#ffb84d" font-size="9">🔸 Scout x1   QUOEN I → VEGA III   (5:12)</text>
</svg>
