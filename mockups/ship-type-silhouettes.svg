<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" style="background:#0a0a0a">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
  </defs>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" fill="#4fffb0" font-size="14" font-weight="bold">SHIP TYPE SILHOUETTES</text>

  <!-- SCOUT -->
  <g transform="translate(75, 90)">
    <polygon points="0,-24 -12,12 0,6 12,12" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="-6" y1="12" x2="-10" y2="20" stroke="#4fffb0" stroke-width="1"/>
    <line x1="6" y1="12" x2="10" y2="20" stroke="#4fffb0" stroke-width="1"/>
    <line x1="0" y1="6" x2="0" y2="20" stroke="#4fffb0" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="9">SCOUT</text>
    <text x="0" y="52" text-anchor="middle" fill="#2a9968" font-size="7">SPD:7 ATK:10 DEF:20</text>
  </g>

  <!-- FREIGHTER -->
  <g transform="translate(200, 90)">
    <rect x="-14" y="-18" width="28" height="32" rx="3" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="-14" y1="-6" x2="14" y2="-6" stroke="#2a9968" stroke-width="1"/>
    <line x1="-14" y1="6" x2="14" y2="6" stroke="#2a9968" stroke-width="1"/>
    <rect x="-4" y="14" width="3" height="8" fill="#2a9968"/>
    <rect x="1" y="14" width="3" height="8" fill="#2a9968"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="9">FREIGHTER</text>
    <text x="0" y="52" text-anchor="middle" fill="#2a9968" font-size="7">SPD:3 ATK:0 DEF:30</text>
  </g>

  <!-- DESTROYER -->
  <g transform="translate(325, 90)">
    <polygon points="0,-26 -16,10 -10,14 0,8 10,14 16,10" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="-8" y1="14" x2="-12" y2="22" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="8" y1="14" x2="12" y2="22" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="-3" y1="8" x2="-3" y2="22" stroke="#4fffb0" stroke-width="1"/>
    <line x1="3" y1="8" x2="3" y2="22" stroke="#4fffb0" stroke-width="1"/>
    <circle cx="0" cy="-10" r="3" fill="#2a9968"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="9">DESTROYER</text>
    <text x="0" y="52" text-anchor="middle" fill="#2a9968" font-size="7">SPD:5 ATK:50 DEF:40</text>
  </g>

  <!-- PROBE -->
  <g transform="translate(450, 90)">
    <circle cx="0" cy="-10" r="8" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="2" fill="#4fffb0"/>
    <line x1="-8" y1="-10" x2="-14" y2="-10" stroke="#2a9968" stroke-width="1"/>
    <line x1="8" y1="-10" x2="14" y2="-10" stroke="#2a9968" stroke-width="1"/>
    <line x1="0" y1="-2" x2="0" y2="8" stroke="#4fffb0" stroke-width="1"/>
    <polygon points="-6,8 6,8 4,16 -4,16" fill="none" stroke="#2a9968" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="9">PROBE</text>
    <text x="0" y="52" text-anchor="middle" fill="#2a9968" font-size="7">SPD:8 ATK:0 DEF:5</text>
  </g>

  <!-- BATTLESHIP -->
  <g transform="translate(550, 90)">
    <polygon points="0,-26 -18,6 -14,14 0,10 14,14 18,6" fill="none" stroke="#4fffb0" stroke-width="1.5"/>
    <line x1="-16" y1="6" x2="-20" y2="-4" stroke="#4fffb0" stroke-width="1"/>
    <line x1="16" y1="6" x2="20" y2="-4" stroke="#4fffb0" stroke-width="1"/>
    <rect x="-3" y="10" width="6" height="10" fill="none" stroke="#2a9968" stroke-width="1"/>
    <line x1="-8" y1="14" x2="-8" y2="22" stroke="#4fffb0" stroke-width="1"/>
    <line x1="8" y1="14" x2="8" y2="22" stroke="#4fffb0" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" fill="#4fffb0" font-size="9">BATTLESHIP</text>
    <text x="0" y="52" text-anchor="middle" fill="#2a9968" font-size="7">SPD:4 ATK:80 DEF:70</text>
  </g>

  <!-- Border -->
  <rect x="2" y="2" width="596" height="156" fill="none" stroke="#0d3020" stroke-width="1" rx="4"/>
</svg>
