<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" style="background:#050a08">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
  </defs>

  <!-- Panel -->
  <rect x="10" y="10" width="400" height="240" rx="6" fill="rgba(0,10,5,0.95)" stroke="#ffb84d" stroke-width="1.5"/>

  <!-- Header -->
  <line x1="30" y1="34" x2="100" y2="34" stroke="#ffb84d" stroke-width="1" opacity="0.4"/>
  <text x="210" y="38" text-anchor="middle" fill="#ffb84d" font-size="11" font-weight="bold">IN TRANSIT</text>
  <line x1="310" y1="34" x2="390" y2="34" stroke="#ffb84d" stroke-width="1" opacity="0.4"/>

  <!-- Ship name -->
  <text x="210" y="64" text-anchor="middle" fill="#4fffb0" font-size="12" font-weight="bold">DESTROYER</text>
  <text x="210" y="78" text-anchor="middle" fill="#2a9968" font-size="8">ATK:50  DEF:40  SPD:5</text>

  <!-- Route visualization -->
  <!-- Origin star -->
  <circle cx="70" cy="120" r="6" fill="#4fffb0"/>
  <text x="70" y="140" text-anchor="middle" fill="#4fffb0" font-size="8">QUOEN I</text>

  <!-- Route line (full) -->
  <line x1="82" y1="120" x2="338" y2="120" stroke="#0d3020" stroke-width="3" stroke-linecap="round"/>

  <!-- Progress fill -->
  <line x1="82" y1="120" x2="192" y2="120" stroke="#ffb84d" stroke-width="3" stroke-linecap="round"/>

  <!-- Ship marker (current position) -->
  <polygon points="192,114 186,122 192,120 198,122" fill="#ffb84d"/>
  <circle cx="192" cy="120" r="4" fill="none" stroke="#ffb84d" stroke-width="1">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Destination star -->
  <circle cx="350" cy="120" r="6" fill="#ffb84d" opacity="0.6"/>
  <text x="350" y="140" text-anchor="middle" fill="#ffb84d" font-size="8">VEGA III</text>

  <!-- Stats row -->
  <text x="70" y="170" fill="#2a9968" font-size="9">Departed:</text>
  <text x="170" y="170" fill="#4fffb0" font-size="9">2m 36s ago</text>

  <text x="70" y="186" fill="#2a9968" font-size="9">Arriving:</text>
  <text x="170" y="186" fill="#ffb84d" font-size="9" font-weight="bold">3m 24s</text>

  <text x="70" y="202" fill="#2a9968" font-size="9">Distance:</text>
  <text x="170" y="202" fill="#4fffb0" font-size="9">4.2 ly</text>

  <!-- Progress bar -->
  <text x="70" y="222" fill="#2a9968" font-size="9">Progress:</text>
  <rect x="170" y="214" width="160" height="10" rx="4" fill="#0d3020"/>
  <rect x="170" y="214" width="69" height="10" rx="4" fill="#ffb84d"/>
  <text x="345" y="222" fill="#ffb84d" font-size="9">43%</text>

  <!-- Back button -->
  <rect x="165" y="234" width="80" height="18" rx="3" fill="none" stroke="#2a9968" stroke-width="1"/>
  <text x="205" y="247" text-anchor="middle" fill="#2a9968" font-size="9">BACK</text>
</svg>
