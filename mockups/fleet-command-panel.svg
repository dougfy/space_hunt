<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" style="background:#050a08">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
  </defs>

  <!-- Panel border -->
  <rect x="10" y="10" width="500" height="400" rx="6" fill="rgba(0,10,5,0.95)" stroke="#4fffb0" stroke-width="1.5"/>

  <!-- Header -->
  <line x1="30" y1="34" x2="130" y2="34" stroke="#1a5c3f" stroke-width="1"/>
  <text x="260" y="38" text-anchor="middle" fill="#4fffb0" font-size="12" font-weight="bold">FLEET COMMAND</text>
  <line x1="390" y1="34" x2="490" y2="34" stroke="#1a5c3f" stroke-width="1"/>

  <!-- Tabs -->
  <rect x="180" y="50" width="70" height="22" rx="3" fill="none" stroke="#1a5c3f" stroke-width="1"/>
  <text x="215" y="65" text-anchor="middle" fill="#1a5c3f" font-size="9">BUILD</text>
  <rect x="260" y="50" width="70" height="22" rx="3" fill="rgba(20,80,60,0.6)" stroke="#4fffb0" stroke-width="1.5"/>
  <text x="295" y="65" text-anchor="middle" fill="#4fffb0" font-size="9" font-weight="bold">FLEET</text>

  <!-- Star group: QUOEN I -->
  <text x="30" y="100" fill="#4fffb0" font-size="10" font-weight="bold">★ QUOEN I</text>
  <line x1="110" y1="97" x2="390" y2="97" stroke="#0d3020" stroke-width="1"/>
  <!-- Badges -->
  <text x="410" y="100" fill="#4fffb0" font-size="9">⚓3</text>
  <text x="450" y="100" fill="#2a9968" font-size="9">⏸1</text>

  <!-- Ship rows - QUOEN I -->
  <rect x="30" y="108" width="460" height="80" rx="3" fill="rgba(13,48,32,0.3)" stroke="#0d3020" stroke-width="1"/>

  <!-- Row 1: Scout (selected) -->
  <rect x="34" y="112" width="452" height="18" rx="2" fill="rgba(20,80,60,0.4)" stroke="#4fffb0" stroke-width="1"/>
  <text x="44" y="124" fill="#4fffb0" font-size="9">▶</text>
  <text x="60" y="124" fill="#4fffb0" font-size="9" font-weight="bold">Scout</text>
  <text x="200" y="124" fill="#2a9968" font-size="9">x1</text>
  <text x="260" y="124" fill="#4fffb0" font-size="9">⚓ DOCKED</text>
  <!-- Action buttons -->
  <rect x="370" y="114" width="40" height="14" rx="2" fill="none" stroke="#4fffb0" stroke-width="1"/>
  <text x="390" y="124" text-anchor="middle" fill="#4fffb0" font-size="7">MOVE</text>
  <rect x="416" y="114" width="36" height="14" rx="2" fill="none" stroke="#2a9968" stroke-width="1"/>
  <text x="434" y="124" text-anchor="middle" fill="#2a9968" font-size="7">INFO</text>

  <!-- Row 2: Freighter -->
  <text x="44" y="144" fill="#2a9968" font-size="9">🔹</text>
  <text x="60" y="144" fill="#2a9968" font-size="9">Freighter</text>
  <text x="200" y="144" fill="#2a9968" font-size="9">x1</text>
  <text x="260" y="144" fill="#4fffb0" font-size="9">⚓ DOCKED</text>

  <!-- Row 3: Basic Probe -->
  <text x="44" y="164" fill="#2a9968" font-size="9">🔹</text>
  <text x="60" y="164" fill="#2a9968" font-size="9">Basic Probe</text>
  <text x="200" y="164" fill="#2a9968" font-size="9">x1</text>
  <text x="260" y="164" fill="#2a9968" font-size="9">⏸ IDLE</text>

  <!-- Row 4: Destroyer in transit -->
  <text x="44" y="184" fill="#ffb84d" font-size="9">🔸</text>
  <text x="60" y="184" fill="#ffb84d" font-size="9">Destroyer</text>
  <text x="200" y="184" fill="#ffb84d" font-size="9">x1</text>
  <text x="260" y="184" fill="#ffb84d" font-size="9">→ VEGA III (3:24)</text>

  <!-- Star group: VEGA III -->
  <text x="30" y="218" fill="#4fffb0" font-size="10" font-weight="bold">★ VEGA III</text>
  <line x1="110" y1="215" x2="390" y2="215" stroke="#0d3020" stroke-width="1"/>
  <text x="410" y="218" fill="#4fffb0" font-size="9">⚓1</text>

  <rect x="30" y="226" width="460" height="24" rx="3" fill="rgba(13,48,32,0.3)" stroke="#0d3020" stroke-width="1"/>
  <text x="44" y="242" fill="#2a9968" font-size="9">🔹</text>
  <text x="60" y="242" fill="#2a9968" font-size="9">Scout</text>
  <text x="200" y="242" fill="#2a9968" font-size="9">x2</text>
  <text x="260" y="242" fill="#4fffb0" font-size="9">⚓ DOCKED</text>

  <!-- Section: IN TRANSIT -->
  <line x1="30" y1="270" x2="80" y2="270" stroke="#ffb84d" stroke-width="1"/>
  <text x="90" y="274" fill="#ffb84d" font-size="9" font-weight="bold">IN TRANSIT</text>
  <line x1="170" y1="270" x2="490" y2="270" stroke="#ffb84d" stroke-width="1" opacity="0.3"/>

  <rect x="30" y="282" width="460" height="24" rx="3" fill="rgba(48,32,0,0.2)" stroke="rgba(255,184,77,0.3)" stroke-width="1"/>
  <text x="44" y="298" fill="#ffb84d" font-size="9">🔸</text>
  <text x="60" y="298" fill="#ffb84d" font-size="9">Destroyer x1</text>
  <text x="200" y="298" fill="#ffb84d" font-size="9">QUOEN I → VEGA III</text>
  <text x="440" y="298" fill="#ffb84d" font-size="9">(3:24)</text>

  <!-- Section: BUILDING -->
  <line x1="30" y1="322" x2="80" y2="322" stroke="#1a5c3f" stroke-width="1"/>
  <text x="90" y="326" fill="#2a9968" font-size="9" font-weight="bold">BUILDING</text>
  <line x1="160" y1="322" x2="490" y2="322" stroke="#1a5c3f" stroke-width="1" opacity="0.3"/>

  <rect x="30" y="334" width="460" height="30" rx="3" fill="rgba(13,48,32,0.2)" stroke="#0d3020" stroke-width="1"/>
  <text x="44" y="350" fill="#2a9968" font-size="9">⚙</text>
  <text x="60" y="350" fill="#2a9968" font-size="9">Scout @ QUOEN I</text>
  <!-- Progress bar -->
  <rect x="260" y="343" width="140" height="8" rx="3" fill="#0d3020"/>
  <rect x="260" y="343" width="87" height="8" rx="3" fill="#2a9968"/>
  <text x="420" y="350" fill="#2a9968" font-size="8">62%</text>
  <text x="300" y="362" fill="#1a5c3f" font-size="7">23s remaining</text>

  <!-- Footer hint -->
  <text x="260" y="395" text-anchor="middle" fill="#1a5c3f" font-size="8">Select a ship and tap MOVE to issue orders</text>
</svg>
