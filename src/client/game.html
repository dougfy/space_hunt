<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>spacehunt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #game-canvas { width: 100%; height: 100%; display: block; }

      /* Overlay UI (inline mode only) */
      #overlay {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        pointer-events: none;
      }
      #overlay.visible { display: flex; }
      #settings-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 100;
        pointer-events: auto;
        background: transparent;
        border: 2px solid #4fffb0;
        color: #4fffb0;
        font-family: monospace;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
        padding: 6px 14px;
        cursor: pointer;
        text-transform: uppercase;
      }
      #settings-btn:hover { background: rgba(79, 255, 176, 0.1); }

      #btn-row {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 16px;
        pointer-events: auto;
      }
      .play-btn {
        font-family: monospace;
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 1px;
        padding: 12px 24px;
        cursor: pointer;
        text-transform: uppercase;
        border: 2px solid;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #play-here {
        background: transparent;
        border-color: #4fffb0;
        color: #4fffb0;
      }
      #play-here:hover { background: rgba(79, 255, 176, 0.15); }
      #play-full {
        background: rgba(40, 80, 100, 0.8);
        border-color: #5ba8c8;
        color: #c8e8f8;
      }
      #play-full:hover { background: rgba(60, 110, 140, 0.9); }

      /* Settings panel */
      #settings-panel {
        position: absolute;
        top: 50px;
        right: 12px;
        z-index: 101;
        display: none;
        flex-direction: column;
        gap: 8px;
        background: rgba(10, 20, 30, 0.95);
        border: 2px solid #4fffb0;
        padding: 14px;
        pointer-events: auto;
        min-width: 200px;
      }
      #settings-panel.visible { display: flex; }
      #settings-panel h3 {
        color: #4fffb0;
        font-family: monospace;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0 0 6px 0;
      }
      .shape-btn {
        background: transparent;
        border: 1px solid #3a7a5a;
        color: #8ff7cf;
        font-family: monospace;
        font-size: 13px;
        padding: 8px 12px;
        cursor: pointer;
        text-align: left;
        text-transform: uppercase;
      }
      .shape-btn:hover { background: rgba(79, 255, 176, 0.1); border-color: #4fffb0; }
      .shape-btn.selected { background: rgba(79, 255, 176, 0.2); border-color: #4fffb0; color: #4fffb0; }

      /* Ghost list */
      #ghost-list {
        max-height: 180px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ghost-row {
        font-family: monospace;
        font-size: 11px;
        color: #8ff7cf;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 3px 0;
        border-bottom: 1px solid rgba(79, 255, 176, 0.15);
      }
      .ghost-name { color: #4fffb0; font-weight: bold; }
      .ghost-coords { color: #6ab89a; }
      .ghost-empty {
        font-family: monospace;
        font-size: 11px;
        color: #5a7a6a;
        font-style: italic;
      }
      #ship-name-input {
        background: rgba(10, 20, 30, 0.9);
        border: 1px solid #3a7a5a;
        color: #8ff7cf;
        font-family: monospace;
        font-size: 13px;
        padding: 8px 12px;
        outline: none;
        width: 100%;
        box-sizing: border-box;
      }
      #ship-name-input:focus {
        border-color: #4fffb0;
      }
      #settings-version {
        font-family: monospace;
        font-size: 10px;
        color: #5a7a6a;
        text-align: right;
        margin-top: 4px;
        border-top: 1px solid rgba(79, 255, 176, 0.15);
        padding-top: 6px;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <button id="settings-btn">SETTINGS</button>
    <div id="settings-panel">
      <h3>Ship Name</h3>
      <input id="ship-name-input" type="text" maxlength="16" placeholder="pilot" autocomplete="off" />
      <h3 style="margin-top:10px">Ship Shape</h3>
      <button class="shape-btn selected" data-shape="arrow">▶ Arrow</button>
      <button class="shape-btn" data-shape="delta">◆ Delta</button>
      <button class="shape-btn" data-shape="needle">│ Needle</button>
      <button class="shape-btn" data-shape="blade">◇ Blade</button>
      <h3 style="margin-top:10px">Nearby Ships</h3>
      <div id="ghost-list"><span class="ghost-empty">none</span></div>
      <div id="settings-version">v0.0.0</div>
    </div>
    <div id="overlay">
      <div id="btn-row">
        <button id="play-here" class="play-btn">&#9654; Play Here</button>
        <button id="play-full" class="play-btn">&#x29C9; Play Full Size</button>
      </div>
    </div>
    <script type="module" src="game.ts"></script>
  </body>
</html>
