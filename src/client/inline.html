<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>spacehunt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #game-canvas { width: 100%; height: 100%; display: block; }

      /* Overlay UI */
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        pointer-events: none;
      }
      #settings-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        pointer-events: auto;
        background: transparent;
        border: 2px solid #4fffb0;
        color: #4fffb0;
        font-family: monospace;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
        padding: 6px 14px;
        cursor: pointer;
        text-transform: uppercase;
      }
      #settings-btn:hover { background: rgba(79, 255, 176, 0.1); }

      #btn-row {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 16px;
        pointer-events: auto;
      }
      .play-btn {
        font-family: monospace;
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 1px;
        padding: 12px 24px;
        cursor: pointer;
        text-transform: uppercase;
        border: 2px solid;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #play-here {
        background: transparent;
        border-color: #4fffb0;
        color: #4fffb0;
      }
      #play-here:hover { background: rgba(79, 255, 176, 0.15); }
      #play-full {
        background: rgba(40, 80, 100, 0.8);
        border-color: #5ba8c8;
        color: #c8e8f8;
      }
      #play-full:hover { background: rgba(60, 110, 140, 0.9); }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="overlay">
      <button id="settings-btn">Settings</button>
      <div id="btn-row">
        <button id="play-here" class="play-btn">&#9654; Play Here</button>
        <button id="play-full" class="play-btn">&#x29C9; Play Full Size</button>
      </div>
    </div>
    <script type="module" src="inline.ts"></script>
  </body>
</html>
